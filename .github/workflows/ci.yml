name: CI

on:
  pull_request:
  # main 更新時にも回し、reg-suit の expected (base 画像) を R2 に確立する。
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.9"

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome check
        run: bun run check:ci

  design-lint:
    name: DESIGN.md lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate DESIGN.md (Stitch spec)
        run: bun run design:lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check (all workspaces)
        run: bun run typecheck

  build:
    name: Build (snapcrop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build snapcrop
        run: bun --filter snapcrop build

  commitlint:
    name: Commit messages
    # github.base_ref / pull_request.head.sha は PR コンテキストにしかない。
    # main への push (= merge 直後) では走らせない。
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate commit messages in PR range
        run: |
          bun commitlint \
            --from "origin/${{ github.base_ref }}" \
            --to "${{ github.event.pull_request.head.sha }}"

  vrt:
    name: VRT (reg-suit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # reg-keygen-git-hash-plugin が base コミットを履歴から探すため、
          # shallow clone では足りない。
          fetch-depth: 0
          # actions/checkout のデフォルトは detached HEAD だが、
          # reg-keygen-git-hash-plugin はブランチ名を必要とする。
          # PR では head ブランチ、main push ではそのまま main を checkout する。
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright (Chromium)
        # @storybook/test-runner は内部で playwright を bundle しており、
        # `bunx playwright` だと registry の最新版を取りに行ってバージョンが
        # ずれる。apps/snapcrop の cwd から呼ぶことで lockfile で固定された
        # 1.59.x を使う。
        working-directory: apps/snapcrop
        run: bun x playwright install --with-deps chromium
      - name: Build Storybook
        run: bun --filter snapcrop build-storybook
      - name: Serve Storybook
        run: |
          nohup python3 -m http.server 6006 \
            --directory apps/snapcrop/storybook-static \
            > /tmp/storybook-http.log 2>&1 &
      - name: Wait for Storybook
        run: bunx wait-on http://localhost:6006 -t 30000
      - name: Capture screenshots
        run: bun --filter snapcrop test-storybook
      - name: Run reg-suit (publish to R2 + post status)
        # 差分があると reg-suit は exit 1 で終わるが、結果は reg context
        # (Commit Status) で表現するのでジョブ自体は失敗扱いにしない。
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          REG_NOTIFY_CLIENT_ID: ${{ secrets.REG_NOTIFY_CLIENT_ID }}
        run: bun run vrt:run
