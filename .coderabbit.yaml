# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Hidoko の CodeRabbit 設定
# - リファレンス: https://docs.coderabbit.ai/reference/configuration
# - サンプル集:   https://github.com/coderabbitai/awesome-coderabbit/tree/main/configs

# ---------------------------------------------------------------------------
# 全体設定
# ---------------------------------------------------------------------------
language: ja-JP
tone_instructions: |
  あなたは Hidoko の CodeRabbit レビュアーです。日本語で、親しみやすくかつ
  簡潔にレビューしてください。指摘は「何が問題か」「なぜ問題か」「どう直すと
  良いか」の3点をセットで示し、AGENTS.md と packages/design-system/SKILL.md
  の方針を尊重してください。装飾的な絵文字や顔文字は控えめにしてください。
early_access: false

# ---------------------------------------------------------------------------
# レビュー
# ---------------------------------------------------------------------------
reviews:
  # Hidoko は Claude Code との AI-in-the-loop で開発しているため、
  # nitpick 込みで多めに指摘を出させる assertive を採用する。
  # 妥当性は AI Agents 向けプロンプト経由で都度検証してから直す前提。
  profile: assertive
  request_changes_workflow: false

  # ウォークスルーは折り畳んで PR 説明欄を圧迫しない。
  high_level_summary: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  # 装飾系はオフ。レビュー本体に集中する。
  poem: false
  in_progress_fortune: false

  # ラベルは提案だけ受け取り、自動付与はしない。
  suggested_labels: true
  auto_apply_labels: false

  # ソロ開発のためレビュアー提案は不要。
  suggested_reviewers: false

  # レビュー対象から外すパス。
  # 生成物・ロックファイル・バイナリアセット・shadcn-ui の自動生成分を除外する。
  path_filters:
    - "!bun.lock"
    - "!**/*.lock"
    - "!**/.DS_Store"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.wrangler/**"
    - "!**/.cache/**"
    - "!packages/design-system/assets/**"
    - "!apps/*/app/components/shadcn-ui/**"

  # パスごとのレビュー指針（短く、判断の足がかりだけ書く）。
  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        - TypeScript は tsconfig.base.json で strict を継承している前提。
          `any` の追加や `// @ts-ignore` / `// @ts-expect-error` などの抑制は
          原則避け、必要なときは理由をコメントに残してください。
        - import の並び替えは Biome の責務です。手動の並び替え指摘は不要です。

    - path: "apps/snapcrop/**"
      instructions: |
        - React Router 7 + Vite + Cloudflare Workers の SPA です。ブラウザで
          動く前提なので、Node 専用 API（`fs` / `path` 等）を直接使ってい
          ないか確認してください。
        - 画像処理は Web 標準 API（Canvas / OffscreenCanvas / Web Worker）を
          優先し、重い処理がメインスレッドを止めていないか見てください。

    - path: "apps/homepage/**"
      instructions: |
        - Cloudflare Workers 上で動くアプリです。Workers ランタイム互換性を
          意識し、Node 専用 API より Web 標準 API を優先してください。

    - path: "packages/design-system/**"
      instructions: |
        - Hidoko のブランド言語そのものです。
          `packages/design-system/SKILL.md` と `README.md` のルールを必ず
          参照したうえでレビューしてください。
        - 守るべき原則: 純粋な白 (`#ffffff`) は使わない / 彩度の高い緑・青は
          避ける / 絵文字は控えめにする。
        - 生のカラーコードを直書きせず、`tokens.css` のトークン経由で参照
          しているか確認してください。

    - path: ".github/workflows/**"
      instructions: |
        - CI では lint / typecheck / build / commitlint を回します。
        - Cloudflare Workers Builds が PR ごとに preview URL を sticky
          コメントしてくれるため、GitHub Actions 側で preview URL を投稿
          するワークフローは追加しないでください。

    - path: "**/package.json"
      instructions: |
        - パッケージマネージャは Bun (>=1.3.9) のみ。`npm` / `yarn` /
          `pnpm` 前提のスクリプトや lockfile が混入していないか確認して
          ください。
        - workspace 配下のスクリプトを増やす場合は、ルートからの
          `bun --filter <name> <script>` でも実行できる名前にしてください。

    - path: "**/*.md"
      instructions: |
        - Hidoko のドキュメントは基本的に日本語、語調は丁寧体で統一です。
        - リポジトリ内へのリンクは相対パス、外部リンクはフル URL を使って
          ください。

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "wip"
      - "DO NOT MERGE"
      - "作業中"
      - "ドラフト"

  finishing_touches:
    docstrings:
      enabled: true

  pre_merge_checks:
    title:
      # commitlint で各コミットは検証済みなので、PR タイトルは warning に留める。
      mode: warning
      requirements: |
        Conventional Commits (`@commitlint/config-conventional`) 準拠を推奨します。
        - 形式: `<type>(<scope>): <subject>`
        - type:  feat / fix / chore / docs / refactor / test / ci / build /
                 perf / style / revert のいずれか。
        - scope: 影響範囲（例: snapcrop, design-system）。リポジトリ全体に
                 及ぶときは省略可。
        - subject: 先頭は lowercase Latin か日本語にしてください。`Capital`
                   始まりの英文は不可。
    description:
      mode: warning
    issue_assessment:
      mode: warning

  tools:
    # 採用済みの静的解析（既定で有効だが、明示しておく）
    biome:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true
    languagetool:
      enabled: true

    # 使っていない linter は明示的に無効化し、重複・ノイズを避ける
    eslint:
      enabled: false
    oxc:
      enabled: false

# ---------------------------------------------------------------------------
# チャット
# ---------------------------------------------------------------------------
chat:
  auto_reply: true

# ---------------------------------------------------------------------------
# ナレッジベース
# ---------------------------------------------------------------------------
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  # AGENTS.md / CLAUDE.md / SKILL.md / 各 README.md をレビュー基準として読ませる。
  # ※既定でも AGENTS.md・CLAUDE.md 等は対象だが、デザインシステムの SKILL.md
  #   とリポジトリ全体の README.md を明示的に追加する。
  code_guidelines:
    enabled: true
    filePatterns:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "packages/design-system/SKILL.md"
      - "packages/*/README.md"
      - "apps/*/README.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto

# ---------------------------------------------------------------------------
# コード生成
# ---------------------------------------------------------------------------
code_generation:
  docstrings:
    language: ja-JP
